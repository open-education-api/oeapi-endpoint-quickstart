<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Change password</title>

        <script src="js/init.js"></script>
        <script src="_quickdashboard_config.json?callback=init"></script>
        <script src="js/oeapi.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.2/css/bootstrap.min.css" />        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>        
        <link rel="stylesheet" href="./css/td_oeapi.css" />
    </head>        
               
    <body class="login-body" style="background-color: #547cb7">

        <div class="login-container">
            <h2>Change Password</h2>
            <form id="changePasswordForm">
                <input type="password" id="oldPassword" placeholder="Current password" required />
                <input type="password" id="newPassword" placeholder="New password" required />
                <button type="submit">Change Password</button>

                <button type="text" id="bckdb" style="margin-top:3em">(Go back to dashboard)</button>
                
            </form>

            <p id="login-resultMsg"></p>


            <div id="message"></div>
        </div>

        <!-- Message popup -->
        <div class="modal fade" id="alertModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header" id="alertModalHeader">
                        <h5 class="modal-title" id="alertModalTitle"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body" id="alertModalBody"></div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                    </div>
                </div>
            </div>
        </div>        

        <script>
            document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const oldPassword = document.getElementById('oldPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                
                let resultMsg = document.getElementById('login-resultMsg');
                let res;

                try {
                    res = await API.changePassword(oldPassword, newPassword);                    
                    if (res.ok) {
                        resultMsg.textContent = "Password changed successfully.";
                        showAlert("success", "Success!", resultMsg.textContent);
                        API.logout();
                        setTimeout(function () {
                            window.location.href = './login.html';
                        }, 2000); // 2000 milliseconds = 2 seconds
                    } else {  // has response but not ok; 400, 401,....
                        resultMsg.textContent = "Error: " + error;
                        showAlert("error", "Error", resultMsg.textContent);
                    }
                  } catch(errResponse) {                      
                            // We can get a simple message or more elaborated depending on the issue
                            if (errResponse.responseText || errResponse.responseJSON) { 
                                    let message = errResponse.responseText ? errResponse.responseText : errResponse.responseJSON.messages[0];
                                    resultMsg.textContent = "Change password has failed " + " ( Cause: "+message+" )";
                                    showAlert("error","Error", resultMsg.textContent); 
                                    
                            } else {    
                                    resultMsg.textContent = "Communitacions Problem or Undefined Error";
                                    showAlert("error",resultMsg.textContent, "Posibly no internet connection or cannot establish proper connection with the Endpoint");                                    
                             }                           
                          }
            });
            
            document.getElementById('bckdb').addEventListener('click', () => {
                window.location.href = './oeapi-td.html';
            });                   
            
        </script>

    </body>
</html>
