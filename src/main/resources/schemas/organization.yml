type: object
properties:
  primaryCode:
    type: object
    properties:
      codeType:
        type: string
      code:
        type: string
    required: ["codeType", "code"]
  organizationId:
    type: string
    format: uuid # Validate UUID format
  link:
    type: string
    format: uri
  logo:
    type: string
    format: uri
  shortName:
    type: string
  city:
    type: string
  streetNumber:
    type: string
  name:
    type: array
    items:
      type: object
      properties:
        language:
          type: string
        value:
          type: string
      required: ["language", "value"]
  description:
    type: array
    items:
      type: object
      properties:
        language:
          type: string
        value:
          type: string
      required: ["language", "value"]
  organizationType:
    type: string
    enum: ["root","institute","department","faculty","branch","academy","school"]
required: ["primaryCode","organizationType","name","shortName"]
