name: Run tests
on:
  workflow_call:
  push:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql
        env:
          MYSQL_ROOT_PASSWORD: x
          MYSQL_DATABASE: oeapi_qs
          MYSQL_USER: oeapi_qs
          MYSQL_PASSWORD: oeapi_qs
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -px"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
        ports:
          - 3306:3306

    steps:

    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '18'

    - uses: actions/checkout@v6

    - uses: actions/cache@v5
      with:
        path: "~/.m2"
        key: "${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}"
        restore-keys: |
          ${{ runner.os }}-m2


    - name: run tests
      run: |
        mvn -DskipTests=false \
            -Dspring.datasource.url='jdbc:mysql://localhost/oeapi_qs' \
            clean test
